name: Playwright Tests & Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      fail_on_a11y:
        description: 'Set to true to fail build on accessibility violations'
        required: false
        default: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # CI enforces accessibility failures by default; can be overridden via workflow_dispatch input
      FAIL_ON_A11Y: ${{ github.event.inputs.fail_on_a11y || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Lint tests
        run: npx eslint "tests/**/*.ts" || true

      - name: Run Playwright tests
        run: |
          echo "FAIL_ON_A11Y=${{ env.FAIL_ON_A11Y }}"
          npm test
        # allow step to fail so we can still collect artifacts, but fail job if FAIL_ON_A11Y=true
        continue-on-error: true
        id: run_tests

      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p allure-report || true
          npx allure generate ./allure-results --clean -o ./allure-report || true

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ./allure-results

      - name: Fail job on a11y if requested
        if: always()
        run: |
          if [ "${{ env.FAIL_ON_A11Y }}" = "true" ]; then
            echo "FAIL_ON_A11Y is true. Failing job if tests failed.";
            if [ "${{ steps.run_tests.outcome }}" != "success" ]; then
              echo "Tests failed — failing job due to FAIL_ON_A11Y=true";
              exit 1;
            fi
          else
            echo "FAIL_ON_A11Y is false — keeping job green despite test failures.";
          fi
